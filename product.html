<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Détail Produit - LOUNARA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="main-header">
  <img src="images/logo.png" alt="LOUNARA" class="logo">
  <p class="subtitle">Collection Femme & Beauté</p>
</header>
<div class="back-button">
  <a href="index.html">
    <svg class="arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Retour à la liste
  </a>
</div>

<main class="product-layout">

  <div class="product-images">
    <img class="main-image" src="" alt="">
    <div class="thumbnails"></div>
  </div>

  <div class="product-info">
    <h2 class="product-name"></h2>
    <p class="product-description"></p>
    <p class="order-info">Pour réserver, nous contacter sur Instagram, Facebook ou WhatsApp.</p>
  </div>

</main>

  <section class="contact">
  <h2>Contact</h2>
  <p>Pour réserver, contactez-nous sur :</p>

  <div class="contact-icons">
    <a href="https://www.instagram.com/" target="_blank">
      <img src="images/instagram.png" alt="Instagram">
    </a>
    <a href="https://www.facebook.com/" target="_blank">
      <img src="images/facebook.png" alt="Facebook">
    </a>
  </div>
</section>
  
<footer>
  © 2026 LOUNARA — Tous droits réservés
</footer>

<a href="https://wa.me/21600000000" target="_blank" class="whatsapp-float">💬</a>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');

fetch('json/products.json')
.then(res=>res.json())
.then(products=>{
  const p = products.find(prod => prod.id === productId);
  if(!p) return;

  document.querySelector('.product-name').textContent = p.name;
  document.querySelector('.product-description').textContent = p.description;

  const mainImage = document.querySelector('.main-image');
  const thumbnails = document.querySelector('.thumbnails');

  mainImage.src = p.images[0];

  p.images.forEach((imgSrc,index)=>{
    const thumb = document.createElement('img');
    thumb.src = imgSrc;
    thumb.classList.add('thumb');
    if(index===0) thumb.classList.add('active-thumb');
    thumbnails.appendChild(thumb);

    thumb.addEventListener('click', ()=>{
      mainImage.src = imgSrc;
      document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active-thumb'));
      thumb.classList.add('active-thumb');
    });
  });
});
</script>

</body>
</html>
