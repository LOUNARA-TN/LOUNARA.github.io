<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Détail Produit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter,sans-serif}

.container{
  max-width:1100px;
  margin:auto;
  padding:40px;
}

.product-layout{
  display:flex;
  gap:50px;
  flex-wrap:wrap;
}

.main-image{
  width:400px;
  height:500px;
  object-fit:cover;
  border-radius:12px;
}

.thumbnails{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.thumb{
  width:70px;
  height:90px;
  object-fit:cover;
  cursor:pointer;
  opacity:.6;
}

.thumb.active{
  opacity:1;
  border:2px solid #a77a7a;
}

.product-info{
  max-width:500px;
}

.product-name{
  font-size:28px;
}

.product-price{
  font-size:22px;
  font-weight:600;
  margin-top:10px;
}

.product-source{
  color:#a77a7a;
  margin-top:5px;
}

.product-size{
  margin-top:5px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html">← Retour</a>

<div class="product-layout">

<div>
<img class="main-image">
<div class="thumbnails"></div>
</div>

<div class="product-info">
<h2 class="product-name"></h2>
<p class="product-description"></p>
<p class="product-price"></p>
<p class="product-source"></p>
<p class="product-size"></p>
</div>

</div>

</div>

<script>
const id=new URLSearchParams(window.location.search).get("id");

fetch("json/products.json")
.then(res=>res.json())
.then(products=>{

const p=products.find(x=>x.id===id);
if(!p) return;

document.querySelector(".product-name").textContent=p.name;
document.querySelector(".product-description").textContent=p.description;
document.querySelector(".product-price").textContent=p.price;
document.querySelector(".product-source").textContent="Source : "+p.source;

/* ✅ taille uniquement si existe */
const sizeEl=document.querySelector(".product-size");

if(p.size){
  sizeEl.textContent="Tailles : "+p.size;
}else{
  sizeEl.style.display="none";
}

const main=document.querySelector(".main-image");
const thumbs=document.querySelector(".thumbnails");

main.src=p.images[0];

p.images.forEach((src,i)=>{
const img=document.createElement("img");
img.src=src;
img.className="thumb";

if(i===0) img.classList.add("active");

img.onclick=()=>{
main.src=src;
document.querySelectorAll(".thumb").forEach(t=>t.classList.remove("active"));
img.classList.add("active");
};

thumbs.appendChild(img);
});

});
</script>

</body>
</html>
