<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Détail Produit - LOUNARA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="images/favicon.png">

<!-- Google Fonts optimisés -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* CSS intégré */
body{margin:0;font-family:Inter,sans-serif;background:#fff;color:#111}.main-header{padding:50px 20px 30px;border-bottom:1px solid #eee;text-align:center}.logo{max-width:190px;display:block;margin:0 auto}.subtitle{margin-top:15px;color:#a77a7a;letter-spacing:2px}.back-button{max-width:1200px;margin:30px auto 0;padding:0 40px}.back-button a{font-size:16px;display:inline-flex;align-items:center;text-decoration:none;color:#a77a7a;font-weight:500;transition:color .3s}.back-button .arrow{width:24px;height:24px;margin-right:8px;transition:transform .3s}.back-button a:hover .arrow{transform:translateX(-5px)}.product-layout{display:flex;gap:80px;max-width:1200px;margin:80px auto;padding:0 40px;align-items:flex-start}.main-image{max-width:450px;height:600px;border-radius:20px;object-fit:cover}.thumbnails{display:flex;gap:15px;margin-top:20px}.thumb{width:80px;height:110px;border-radius:10px;cursor:pointer;opacity:.7;object-fit:cover}.active-thumb{border:2px solid #a77a7a;opacity:1}.product-info{max-width:500px}.product-name{font-size:30px;font-family:'Playfair Display',serif}.product-description{margin-top:20px;line-height:1.8}.order-info{margin-top:20px;color:#a77a7a;font-weight:500}.contact{padding:60px 20px;background:#f9f9f9;text-align:center}.contact-icons{margin-top:20px;display:flex;justify-content:center;gap:25px}.contact-icons img{width:28px;height:28px;transition:.3s}.contact-icons img:hover{transform:scale(1.15)}.whatsapp-float{position:fixed;bottom:25px;right:25px;background:#25d366;color:#fff;font-size:22px;padding:15px;border-radius:50%}footer{padding:40px;font-size:12px;color:#999;border-top:1px solid #eee}@media(max-width:900px){.product-layout{flex-direction:column;align-items:center}.main-image{height:500px}}@media(max-width:600px){.categories-menu{display:flex;flex-wrap:nowrap;justify-content:flex-start;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:15px;padding:0 15px;box-sizing:border-box;-ms-overflow-style:none;scrollbar-width:none}.categories-menu a{flex:0 0 auto;white-space:nowrap}.categories-menu::-webkit-scrollbar{display:none}}
.main-header a{text-decoration: none;color: inherit;}
</style>
</head>
<body>

<a href="index.html">
<header class="main-header">
  <img src="images/logo.png" alt="LOUNARA" class="logo" loading="lazy">
  <p class="subtitle">Collection Femme & Beauté</p>
</header>
</a>

<div class="back-button">
  <a href="index.html">
    <svg class="arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Retour à la liste
  </a>
</div>

<main class="product-layout">
  <div class="product-images">
    <img class="main-image" src="" alt="" loading="eager">
    <div class="thumbnails"></div>
  </div>

  <div class="product-info">
    <h2 class="product-name"></h2>
    <p class="product-description"></p>
    <p class="order-info">Pour réserver, nous contacter sur Instagram, Facebook ou WhatsApp.</p>
  </div>
</main>

<section class="contact">
  <h2>Contact</h2>
  <p>Pour réserver, contactez-nous sur :</p>
  <div class="contact-icons">
    <a href="https://www.instagram.com/" target="_blank"><img src="images/instagram.png" alt="Instagram" loading="lazy"></a>
    <a href="https://www.facebook.com/" target="_blank"><img src="images/facebook.png" alt="Facebook" loading="lazy"></a>
    <a href="https://wa.me/21600000000" target="_blank"><img src="images/whatsapp.png" alt="Whatsapp" loading="lazy"></a>
  </div>
</section>

<footer>© 2026 LOUNARA — Tous droits réservés</footer>

<a href="https://wa.me/21600000000" target="_blank" class="whatsapp-float">💬</a>

<script defer>
const params=new URLSearchParams(window.location.search);
const productId=params.get("id");

fetch("json/products.json").then(res=>res.json()).then(products=>{
  const p=products.find(p=>p.id===productId);
  if(!p) return;

  document.querySelector(".product-name").textContent=p.name;
  document.querySelector(".product-description").textContent=p.description;

  const mainImg=document.querySelector(".main-image");
  const thumbs=document.querySelector(".thumbnails");

  // Préchargement de la première image
  const imgFirst=new Image();
  imgFirst.src=p.images[0];
  imgFirst.onload=()=>mainImg.src=p.images[0];

  p.images.forEach((src,i)=>{
    const img=document.createElement("img");
    img.src=src;
    img.classList.add("thumb");
    img.loading="lazy";
    if(i===0) img.classList.add("active-thumb");
    thumbs.appendChild(img);
    img.addEventListener("click",()=>{
      mainImg.src=src;
      document.querySelectorAll(".thumb").forEach(t=>t.classList.remove("active-thumb"));
      img.classList.add("active-thumb");
    });
  });
});
</script>

</body>
</html>
