<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LOUNARA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="images/favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter,sans-serif;background:#fff;color:#111}

.main-header{
  padding:50px 20px 30px;
  border-bottom:1px solid #eee;
  text-align:center;
}

.logo{max-width:190px;display:block;margin:0 auto}

.subtitle{
  margin-top:15px;
  color:#a77a7a;
  letter-spacing:2px;
}

.categories-menu{
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:35px;
  scroll-behavior:smooth;
}

.categories-menu a{
  color:#7a5f5f;
  font-weight:500;
  text-decoration:none;
}

.categories-menu a.active{
  color:#000;
  border-bottom:2px solid #a77a7a;
  padding-bottom:3px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:50px;
  max-width:1200px;
  margin:70px auto;
  padding:0 40px;
}

.item-link{
  color:inherit;
  text-decoration:none;
  display:block;
  transition:.3s;
}

.item-link:hover{
  transform:translateY(-5px);
}

.item-link img{
  width:100%;
  height:420px;
  object-fit:cover;
  border-radius:16px;
}

.item-link h3,
.item-link p{
  text-align:center;
}

.price{
  font-weight:600;
  margin-top:5px;
}

.source{
  font-size:13px;
  color:#a77a7a;
}

.size{
  font-size:13px;
}

/* MOBILE */
@media(max-width:600px){
  .categories-menu{
    display:flex;
    flex-wrap:nowrap;
    justify-content:flex-start;
    overflow-x:auto;
    gap:15px;
    padding:0 15px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }

  .categories-menu::-webkit-scrollbar{
    display:none;
  }

  .categories-menu a{
    flex:0 0 auto;
    white-space:nowrap;
  }
}
</style>
</head>

<body>

<header class="main-header">
<a href="index.html">
<img src="images/logo.png" class="logo">
<p class="subtitle">Collection Femme & Beauté</p>
</a>

<nav class="categories-menu">
<a href="#" data-category="All" class="active">Tous</a>
<a href="#" data-category="Vêtements">Vêtements</a>
<a href="#" data-category="Lingerie">Lingerie</a>
<a href="#" data-category="Sacs et accessoires">Sacs et accessoires</a>
<a href="#" data-category="Produits Beauté">Produits Beauté</a>
</nav>
</header>

<section>
<div class="grid"></div>
</section>

<script>
fetch("json/products.json")
.then(res=>res.json())
.then(products=>{

const grid=document.querySelector(".grid");
const menuLinks=document.querySelectorAll(".categories-menu a");

function filter(category="All"){
grid.innerHTML="";

products
.filter(p=>category==="All"||p.category===category)
.forEach(p=>{

const a=document.createElement("a");
a.href="product.html?id="+p.id;
a.className="item-link";

const img=document.createElement("img");
img.src=p.images[0];

const name=document.createElement("h3");
name.textContent=p.name;

const desc=document.createElement("p");
desc.textContent=p.description;

const price=document.createElement("p");
price.textContent=p.price;
price.className="price";

const source=document.createElement("p");
source.textContent="Source : "+p.source;
source.className="source";

a.append(img,name,desc,price,source);

/* ✅ taille uniquement si existe */
if(p.size){
  const size=document.createElement("p");
  size.textContent="Tailles : "+p.size;
  size.className="size";
  a.appendChild(size);
}

grid.appendChild(a);

});
}

filter();

menuLinks.forEach(link=>{
link.addEventListener("click",e=>{
e.preventDefault();

const cat=link.dataset.category;
filter(cat);

menuLinks.forEach(l=>l.classList.remove("active"));
link.classList.add("active");

link.scrollIntoView({
  behavior:"smooth",
  inline:"center",
  block:"nearest"
});

});
});

});
</script>

</body>
</html>
